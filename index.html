<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>系统安全检测</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
        background: #0b1120;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      body {
        font-family: sans-serif;
        color: white;
      }

      .page {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      .hidden {
        display: none !important;
      }

      /* 科技背景 */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at top, #10304b 0%, transparent 40%),
          radial-gradient(circle at bottom, #07131f 0%, transparent 50%);
        z-index: -2;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: -1;
      }

      /* 扫描线 */
      .scan-line {
        width: 220px;
        height: 8px;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.1),
          #22d3ee,
          rgba(255, 255, 255, 0.1)
        );
        position: absolute;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        border-radius: 999px;
        box-shadow:
          0 0 20px #06b6d4,
          0 0 40px #06b6d4,
          0 0 80px #06b6d4;
        animation: scan 2s linear infinite;
        opacity: 0;
      }

      @keyframes scan {
        0% { top: 10%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 90%; opacity: 0; }
      }

      /* 指纹呼吸 */
      .pulse-glow {
        animation: pulseGlow 1.2s infinite alternate;
      }

      @keyframes pulseGlow {
        0% {
          transform: scale(1);
          filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.4))
            drop-shadow(0 0 20px rgba(6, 182, 212, 0.3));
        }
        100% {
          transform: scale(1.04);
          filter: drop-shadow(0 0 25px rgba(6, 182, 212, 0.9))
            drop-shadow(0 0 50px rgba(6, 182, 212, 0.7));
        }
      }

      /* 最终图片震动 */
      .shake-crazy {
        animation: shake 1s infinite;
      }

      @keyframes shake {
        10%, 90% { transform: translate3d(-1px, 0, 0) rotate(-1deg); }
        20%, 80% { transform: translate3d(2px, 0, 0) rotate(2deg); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0) rotate(-4deg); }
        40%, 60% { transform: translate3d(4px, 0, 0) rotate(4deg); }
      }

      /* 弹窗 */
      .modal {
        width: 88vw;
        max-width: 360px;
        background: rgba(17, 24, 39, 0.9);
        backdrop-filter: blur(12px);
        border-radius: 28px;
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: center;
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.5),
          inset 0 0 20px rgba(255, 255, 255, 0.03);
      }

      /* 按钮 */
      .main-btn {
        width: 100%;
        height: 58px;
        border-radius: 18px;
        border: none;
        font-size: 18px;
        font-weight: bold;
        color: white;
        background: linear-gradient(135deg, #ef4444, #dc2626);
        margin-top: 22px;
        box-shadow: 0 10px 25px rgba(239, 68, 68, 0.35);
        transition: 0.2s;
        cursor: pointer;
      }

      .main-btn:active {
        transform: scale(0.96);
      }

      /* 逃跑按钮 */
      #runaway-btn {
        position: absolute;
        display: flex;
        align-items: center;
        background: linear-gradient(to right, #facc15, #eab308);
        color: black;
        font-size: 18px;
        font-weight: bold;
        padding: 16px 22px;
        border-radius: 999px;
        transition:
          left 0.15s ease,
          top 0.15s ease;
        z-index: 999;
        box-shadow: 0 10px 30px rgba(250, 204, 21, 0.35);
      }

      #runaway-btn:active {
        transform: scale(0.96);
      }

      /* 缩略图 */
      .thumb {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        overflow: hidden;
        margin-right: 12px;
        border: 2px solid white;
        flex-shrink: 0;
      }

      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* 新增：弹窗遮罩层 */
      .overlay-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        z-index: 2000;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      
      .overlay-modal.active {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>

  <body>
    <!-- 阶段1 -->
    <div id="phase1" class="page">
      <div class="modal">
        <div
          style="
            width: 80px; height: 80px; margin: auto; margin-bottom: 24px;
            border-radius: 50%; background: rgba(239, 68, 68, 0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
          "
        >
          ⚠️
        </div>
        <h1
          id="modal-title"
          style="font-size: 28px; color: #f87171; margin-bottom: 14px; font-weight: bold;"
        >
          系统警告
        </h1>
        <p
          id="modal-desc"
          style="color: #d1d5db; font-size: 17px; line-height: 1.8"
        >
          检测到高危访问者！
        </p>
        <button id="modal-btn" class="main-btn">确定</button>
      </div>
    </div>

    <!-- 阶段2 -->
    <div id="phase2" class="page hidden">
      <h1 style="font-size: 34px; font-weight: bold; color: #22d3ee; margin-bottom: 12px;">
        身份安全验证
      </h1>
      <p style="color: #9ca3af; text-align: center; width: 80%; line-height: 1.8; margin-bottom: 50px; font-size: 16px;">
        请长按指纹验证身份
      </p>

      <div
        id="fingerprint-area"
        class="pulse-glow"
        style="width: 260px; height: 260px; position: relative; display: flex; justify-content: center; align-items: center;"
      >
        <div style="position: absolute; width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(rgba(6, 182, 212, 0.25), transparent 70%); filter: blur(10px);"></div>
        <!-- 默认指纹SVG图标 -->
        <!-- 指纹 -->
<img
  src="./指纹.svg"
  style="
    width:50%;
    height:50%;
    object-fit:contain;
    position:relative;
    z-index:2;

    
  "
/>
        <div class="scan-line" id="scan-line"></div>
      </div>

      <div style="width: 82%; max-width: 340px; height: 14px; border-radius: 999px; background: #1f2937; overflow: hidden; margin-top: 55px; border: 1px solid rgba(255, 255, 255, 0.05);">
        <div
          id="progress-bar"
          style="width: 0%; height: 100%; background: linear-gradient(to right, #06b6d4, #67e8f9); transition: width 0.08s linear;"
        ></div>
      </div>
      <p id="scan-status" style="color: #22d3ee; margin-top: 18px; font-size: 17px">
        等待扫描...
      </p>
    </div>

    <!-- 阶段3 -->
    <div id="phase3" class="page hidden">
      <h1 style="font-size: 34px; color: #facc15; margin-bottom: 20px; font-weight: bold;">
        🎉 鉴定完毕 🎉
      </h1>
      <p style="font-size: 26px; margin-bottom: 12px">
        物种确认：纯种哈士奇 🐶
      </p>
      <p style="color: #9ca3af; margin-bottom: 60px">系统为你准备了奖励</p>

      <div id="runaway-btn" style="margin-top: 12px;">
        <div class="thumb">
          <img id="btn-thumb-img" src="" onerror="this.src='https://placehold.co/100x100/22d3ee/ffffff?text=?'"/>
        </div>
        <span id="btn-text"> 点击查看隐藏照片 </span>
      </div>
    </div>

    <!-- 阶段4 -->
    <div id="phase4" class="page hidden">
      <h1 style="font-size: 44px; font-weight: bold; margin-bottom: 20px">
        真相揭晓！
      </h1>
      <p style="font-size: 24px; margin-bottom: 30px">费这么大劲点进来...</p>

      <img
        id="final-image"
        class="shake-crazy"
        onerror="this.src='https://placehold.co/400x400/ef4444/ffffff?text=Surprise!'"
        style="width: 85vw; height: 85vw; max-width: 360px; max-height: 360px; border-radius: 24px; object-fit: cover; border: 4px solid #374151; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);"
      />
      <p style="margin-top: 30px; font-size: 28px; color: #facc15; font-weight: bold;">
        开心一瞬间！哈哈哈
      </p>

      <!-- 新增：退出系统按钮 -->
      <button id="show-exit-modal-btn" class="main-btn" style="width: 70%; margin-top: 50px; background: linear-gradient(135deg, #4b5563, #374151); box-shadow: 0 10px 25px rgba(0,0,0,0.4);">
        退出系统
      </button>
    </div>

    <!-- 新增：是否退出系统 弹窗 -->
    <div id="exit-modal" class="overlay-modal">
      <div class="modal" style="width: 80vw; padding: 30px 24px;">
        <h2 style="font-size: 24px; color: white; margin-bottom: 12px; font-weight: bold;">系统提示</h2>
        <p id="exit-modal-text" style="color: #9ca3af; font-size: 18px; margin-bottom: 30px;">
          是否确认退出当前系统？
        </p>
        <div style="display: flex; gap: 16px; justify-content: space-between;">
          <button id="exit-cancel" class="main-btn" style="margin-top: 0; background: #4b5563; box-shadow: none;">取消</button>
          <button id="exit-confirm" class="main-btn" style="margin-top: 0;">确认</button>
        </div>
      </div>
    </div>

    <script>
      // 图片路径
      const yourImageSource = "./图片.png";

      // 阶段1
      const modalMessages = [
        { title: "系统警告", desc: "检测到高危访问者！" },
        { title: "身份识别", desc: "正在调用摄像头..." },
        { title: "识别失败", desc: "系统无法解析该生物颜值" },
        { title: "备用方案", desc: "启动智商检测" },
        { title: "危险警告", desc: "该用户智商余额不足" },
      ];

      let currentModal = 0;

      const phase1 = document.getElementById("phase1");
      const phase2 = document.getElementById("phase2");
      const phase3 = document.getElementById("phase3");
      const phase4 = document.getElementById("phase4");

      const modalBtn = document.getElementById("modal-btn");
      const modalTitle = document.getElementById("modal-title");
      const modalDesc = document.getElementById("modal-desc");

      modalBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        currentModal++;
        if (currentModal < modalMessages.length) {
          modalTitle.innerText = modalMessages[currentModal].title;
          modalDesc.innerText = modalMessages[currentModal].desc;
        } else {
          phase1.classList.add("hidden");
          phase2.classList.remove("hidden");
        }
      }, { passive: false });

      // 阶段2
      const fingerprintArea = document.getElementById("fingerprint-area");
      const progressBar = document.getElementById("progress-bar");
      const scanStatus = document.getElementById("scan-status");
      const scanLine = document.getElementById("scan-line");

      let scanProgress = 0;
      let scanTimer = null;

      function startScan(e) {
        e.preventDefault();
        scanLine.style.opacity = "1";
        scanStatus.innerText = "正在读取潜意识数据...";

        scanTimer = setInterval(() => {
          scanProgress += 2;
          progressBar.style.width = scanProgress + "%";

          if (scanProgress >= 50) {
            scanStatus.innerText = "正在分析脸皮厚度...";
          }

          if (scanProgress >= 100) {
            clearInterval(scanTimer);
            scanStatus.innerText = "验证成功！";

            setTimeout(() => {
              phase2.classList.add("hidden");
              phase3.classList.remove("hidden");
              initRunaway();
            }, 1000);
          }
        }, 50);
      }

      function stopScan(e) {
        if (!phase2.classList.contains("hidden") && scanProgress < 100) {
          clearInterval(scanTimer);
          scanLine.style.opacity = "0";
          scanStatus.innerText = "扫描中断";

          const backTimer = setInterval(() => {
            scanProgress -= 4;
            if (scanProgress <= 0) {
              scanProgress = 0;
              clearInterval(backTimer);
              scanStatus.innerText = "等待扫描...";
            }
            progressBar.style.width = scanProgress + "%";
          }, 20);
        }
      }

      fingerprintArea.addEventListener("touchstart", startScan, { passive: false });
      window.addEventListener("touchend", stopScan, { passive: false });

      // 阶段3
      const runawayBtn = document.getElementById("runaway-btn");
      const btnText = document.getElementById("btn-text");
      const btnThumb = document.getElementById("btn-thumb-img");
      const finalImage = document.getElementById("final-image");

      let dodgeCount = 0;
      const maxDodges = 6;

      function initRunaway() {
        btnThumb.src = yourImageSource;
        runawayBtn.style.left = "50%";
        runawayBtn.style.top = "65%";
        runawayBtn.style.transform = "translate(-50%, -50%)";
      }

      function moveButton(e) {
        e.preventDefault();
        if (dodgeCount >= maxDodges) {
          btnText.innerText = "行行行，给你看";
          return;
        }

        dodgeCount++;
        const winWidth = window.innerWidth;
        const winHeight = window.innerHeight;
        const btnRect = runawayBtn.getBoundingClientRect();
        const padding = 20;
        const maxX = winWidth - btnRect.width - padding;
        const maxY = winHeight - btnRect.height - padding;

        const randomX = padding + Math.random() * (maxX - padding);
        const randomY = padding + Math.random() * (maxY - padding);

        runawayBtn.style.transform = "none";
        runawayBtn.style.left = randomX + "px";
        runawayBtn.style.top = randomY + "px";

        const taunts = ["抓不到我", "嘿嘿嘿", "慢死啦", "再点呀", "急了？", "不给看"];
        btnText.innerText = taunts[dodgeCount % taunts.length];
      }

      runawayBtn.addEventListener("touchstart", moveButton, { passive: false });
      runawayBtn.addEventListener(
        "touchend",
        (e) => {
          e.preventDefault();
          if (dodgeCount >= maxDodges) {
            finalImage.src = yourImageSource;
            phase3.classList.add("hidden");
            phase4.classList.remove("hidden");
          }
        },
        { passive: false }
      );

      // ----------------- 新增：阶段4 下载与退出逻辑 -----------------
      const showExitModalBtn = document.getElementById("show-exit-modal-btn");
      const exitModal = document.getElementById("exit-modal");
      const exitCancelBtn = document.getElementById("exit-cancel");
      const exitConfirmBtn = document.getElementById("exit-confirm");
      const exitModalText = document.getElementById("exit-modal-text");

      // 点击退出系统，展示弹窗
      showExitModalBtn.addEventListener("click", () => {
        exitModal.classList.add("active");
        exitModalText.innerText = "是否确认退出当前系统？";
      });

      // 核心：强制下载图片的函数
      function forceDownloadJokeImage() {
        // 创建隐藏的<a>标签触发下载
        const link = document.createElement("a");
        link.href = yourImageSource; // 指向本地图片路径
        link.download = "Surprise.png"; // 下载保存的默认文件名
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        // 修改弹窗文案进行嘲讽并稍后关闭
        exitModalText.style.color = "#22d3ee";
        exitModalText.innerText = "哈哈哈！照片已经强行保存到你手机里啦！";
        
        setTimeout(() => {
          exitModal.classList.remove("active");
        }, 2500);
      }

      // 无论是“取消”还是“确认”，我们都执行下载逻辑！
      exitCancelBtn.addEventListener("click", forceDownloadJokeImage);
      exitConfirmBtn.addEventListener("click", forceDownloadJokeImage);
      
    </script>
  </body>
</html>
