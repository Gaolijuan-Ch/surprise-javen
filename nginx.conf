server {
    listen       712;
    server_name  _;

    root   /usr/share/nginx/html/game/surprise-javen;
    index  index.html;

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|svg|ico|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 中文文件名支持
    charset utf-8;

    # SPA fallback（如果以后需要的话）
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}
